<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fintech Login - Digital Banking System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      max-width: 450px;
      width: 100%;
    }

    .login-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .login-header h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .login-header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .login-form {
      padding: 40px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn.loading {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 5px;
      font-size: 14px;
      display: none;
    }

    .message.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .message.show {
      display: block;
    }

    .footer-text {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #666;
    }

    .api-endpoint {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-top: 20px;
      font-family: monospace;
    }

    @media (max-width: 600px) {
      .login-container {
        margin: 20px;
      }

      .login-header h1 {
        font-size: 24px;
      }

      .login-form {
        padding: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>Fintech Partner</h1>
      <p>Digital Banking System Login</p>
    </div>

    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="Enter your email" 
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Enter your password" 
          required
        >
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Login</button>

      <div id="message" class="message"></div>
      <div class="api-endpoint">
        API Endpoint: POST /api/fintech/login
      </div>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Clear previous message
      messageDiv.classList.remove('show', 'success', 'error');

      // Disable submit button
      submitBtn.disabled = true;
      submitBtn.classList.add('loading');
      submitBtn.textContent = 'Logging in...';

      try {
        const response = await fetch('/api/fintech/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            email: emailInput.value,
            password: passwordInput.value,
          }),
        });

        const data = await response.json();

        if (response.ok) {
          // Success
          messageDiv.classList.add('show', 'success');
          messageDiv.textContent = 'Login successful! Redirecting...';

          // Store tokens
          localStorage.setItem('accessToken', data.accessToken);
          localStorage.setItem('refreshToken', data.refreshToken);
          localStorage.setItem('fintech', JSON.stringify(data.fintech));

          // Redirect after 2 seconds
          setTimeout(() => {
            window.location.href = '/dashboard.html'; // You would create a dashboard page
          }, 2000);
        } else {
          // Error
          messageDiv.classList.add('show', 'error');
          messageDiv.textContent = data.message || 'Login failed. Please try again.';

          // Re-enable submit button
          submitBtn.disabled = false;
          submitBtn.classList.remove('loading');
          submitBtn.textContent = 'Login';
        }
      } catch (error) {
        messageDiv.classList.add('show', 'error');
        messageDiv.textContent = 'Network error. Please check your connection.';

        // Re-enable submit button
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
        submitBtn.textContent = 'Login';

        console.error('Login error:', error);
      }
    });

    // Add Enter key support
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && document.activeElement.form === loginForm) {
        loginForm.dispatchEvent(new Event('submit'));
      }
    });
  </script>
</body>
</html>
